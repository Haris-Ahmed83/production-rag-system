services:
  - type: web
    name: rag-backend
    env: docker
    dockerfilePath: ../backend/backend_dockerfile
    repo: https://github.com/YOUR_USERNAME/YOUR_REPO
    branch: main
    healthCheckPath: /api/health
    envVars:
      - key: QDRANT_HOST
        value: rag-qdrant
      - key: QDRANT_PORT
        value: 6333
      - key: EMBEDDING_MODEL
        value: BAAI/bge-base-en-v1.5
      - key: EMBEDDING_DEVICE
        value: cpu
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_API_KEY
        sync: false
      - key: LLM_MODEL
        value: llama3-8b-8192
      - key: SECRET_KEY
        generateValue: true
      - key: LANGFUSE_HOST
        value: https://cloud.langfuse.com
      - key: LANGFUSE_PUBLIC_KEY
        sync: false
      - key: LANGFUSE_SECRET_KEY
        sync: false
